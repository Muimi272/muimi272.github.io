  <script src="../assets/main.js"></script>
  <script>
    (() => {
      const GRID = 24;
      const BASE_SPEED = 4.2;
      const SCORE_STEP = 10;
      const BEST_KEY = "snake-best-score";

      const canvas = document.getElementById("snakeCanvas");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const speedEl = document.getElementById("speed");
      const startBtn = document.getElementById("startBtn");
      const pauseBtn = document.getElementById("pauseBtn");
      const restartBtn = document.getElementById("restartBtn");
      const overlay = document.getElementById("overlay");
      const overlayTitle = document.getElementById("overlayTitle");
      const overlayText = document.getElementById("overlayText");
      const overlayBtn = document.getElementById("overlayBtn");
      const dpadButtons = document.querySelectorAll("[data-dir]");
      const mobileControlMode = window.matchMedia("(hover: none) and (pointer: coarse)").matches;

      const state = {
        snake: [],
        food: { x: 0, y: 0 },
        direction: "right",
        nextDirection: "right",
        running: false,
        paused: false,
        over: false,
        score: 0,
        best: 0,
        accumulator: 0,
        lastTime: 0,
        rafId: 0,
        foodPulse: 0
      };

      function speedByScore(score) {
        return BASE_SPEED + 0.008 * Math.pow(Math.max(0, score), 1.28);
      }

      function loadBest() {
        const raw = parseInt(localStorage.getItem(BEST_KEY) || "0", 10);
        state.best = Number.isNaN(raw) ? 0 : raw;
      }

      function saveBest() {
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem(BEST_KEY, String(state.best));
        }
      }

      function updateUi() {
        scoreEl.textContent = String(state.score);
        bestEl.textContent = String(state.best);
        speedEl.textContent = `${speedByScore(state.score).toFixed(2)} 格/秒`;
        pauseBtn.disabled = !state.running || state.over;
        restartBtn.disabled = !state.running && !state.over;
        pauseBtn.textContent = state.paused ? "继续" : "暂停";
      }

      function setStatus(_) {}

      function showOverlay(title, text, btnText, onClick) {
        overlayTitle.textContent = title;
        overlayText.textContent = text;
        overlayBtn.textContent = btnText;
        overlay.classList.remove("hidden");
        overlayBtn.onclick = onClick;
      }

      function hideOverlay() {
        overlay.classList.add("hidden");
      }

      function randomEmptyCell() {
        let cell;
        do {
          cell = {
            x: Math.floor(Math.random() * GRID),
            y: Math.floor(Math.random() * GRID)
          };
        } while (state.snake.some((item) => item.x === cell.x && item.y === cell.y));
        return cell;
      }

      function resetGameData() {
        const c = Math.floor(GRID / 2);
        state.snake = [
          { x: c - 1, y: c },
          { x: c, y: c },
          { x: c + 1, y: c }
        ];
        state.direction = "right";
        state.nextDirection = "right";
        state.score = 0;
        state.accumulator = 0;
        state.lastTime = 0;
        state.over = false;
        state.food = randomEmptyCell();
        setStatus("待开始");
        updateUi();
      }

      function isOpposite(a, b) {
        return (
          (a === "up" && b === "down") ||
          (a === "down" && b === "up") ||
          (a === "left" && b === "right") ||
          (a === "right" && b === "left")
        );
      }

      function setDirection(next) {
        if (!state.running || state.paused || state.over) return;
        if (isOpposite(state.direction, next)) return;
        state.nextDirection = next;
      }

      function stepSnake() {
        state.direction = state.nextDirection;

        const head = state.snake[state.snake.length - 1];
        const next = { x: head.x, y: head.y };

        if (state.direction === "up") next.y -= 1;
        if (state.direction === "down") next.y += 1;
        if (state.direction === "left") next.x -= 1;
        if (state.direction === "right") next.x += 1;

        if (next.x < 0) next.x = GRID - 1;
        if (next.y < 0) next.y = GRID - 1;
        if (next.x >= GRID) next.x = 0;
        if (next.y >= GRID) next.y = 0;

        if (state.snake.some((part) => part.x === next.x && part.y === next.y)) {
          gameOver();
          return false;
        }

        state.snake.push(next);

        if (next.x === state.food.x && next.y === state.food.y) {
          state.score += SCORE_STEP;
          state.food = randomEmptyCell();
          updateUi();
          setStatus("加速中");
        } else {
          state.snake.shift();
        }

        return true;
      }

      function gameOver() {
        state.over = true;
        state.running = false;
        state.paused = false;
        saveBest();
        updateUi();
        setStatus(`结束，本局 ${state.score} 分`);
        showOverlay(
          "游戏结束",
          `本局得分 ${state.score}，最高分 ${state.best}。`,
          "再来一局",
          () => restartGame()
        );
      }

      function drawGrid() {
        const tile = canvas.width / GRID;
        ctx.strokeStyle = "rgba(255,255,255,0.06)";
        ctx.lineWidth = 1;

        for (let i = 0; i <= GRID; i += 1) {
          const p = i * tile;
          ctx.beginPath();
          ctx.moveTo(p, 0);
          ctx.lineTo(p, canvas.height);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(0, p);
          ctx.lineTo(canvas.width, p);
          ctx.stroke();
        }
      }

      function drawCell(x, y, color, padding = 2, radius = 5) {
        const tile = canvas.width / GRID;
        const px = x * tile + padding;
        const py = y * tile + padding;
        const w = tile - padding * 2;
        const h = tile - padding * 2;

        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(px + radius, py);
        ctx.lineTo(px + w - radius, py);
        ctx.quadraticCurveTo(px + w, py, px + w, py + radius);
        ctx.lineTo(px + w, py + h - radius);
        ctx.quadraticCurveTo(px + w, py + h, px + w - radius, py + h);
        ctx.lineTo(px + radius, py + h);
        ctx.quadraticCurveTo(px, py + h, px, py + h - radius);
        ctx.lineTo(px, py + radius);
        ctx.quadraticCurveTo(px, py, px + radius, py);
        ctx.closePath();
        ctx.fill();
      }

      function drawSnake() {
        state.snake.forEach((part, index) => {
          const isHead = index === state.snake.length - 1;
          const color = isHead ? "#8fb3ff" : "#65d2a6";
          drawCell(part.x, part.y, color, 2, isHead ? 6 : 4);

          if (isHead) {
            const tile = canvas.width / GRID;
            const cx = part.x * tile;
            const cy = part.y * tile;
            const eyeRadius = Math.max(2, tile * 0.05);
            const eyeDistance = tile * 0.19;
            const frontOffset = tile * 0.24;

            let centerX = cx + tile / 2;
            let centerY = cy + tile / 2;
            let offsetX = 0;
            let offsetY = 0;

            if (state.direction === "right") {
              centerX += frontOffset;
              offsetY = eyeDistance;
            } else if (state.direction === "left") {
              centerX -= frontOffset;
              offsetY = eyeDistance;
            } else if (state.direction === "up") {
              centerY -= frontOffset;
              offsetX = eyeDistance;
            } else if (state.direction === "down") {
              centerY += frontOffset;
              offsetX = eyeDistance;
            }

            ctx.fillStyle = "rgba(255,255,255,0.92)";
            ctx.beginPath();
            ctx.arc(centerX + offsetX, centerY + offsetY, eyeRadius, 0, Math.PI * 2);
            ctx.arc(centerX - offsetX, centerY - offsetY, eyeRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "rgba(20,36,60,0.92)";
            ctx.beginPath();
            ctx.arc(centerX + offsetX, centerY + offsetY, Math.max(1.2, eyeRadius * 0.46), 0, Math.PI * 2);
            ctx.arc(centerX - offsetX, centerY - offsetY, Math.max(1.2, eyeRadius * 0.46), 0, Math.PI * 2);
            ctx.fill();
          }
        });
      }

      function drawFood(timestamp) {
        state.foodPulse = (Math.sin(timestamp / 140) + 1) / 2;
        const glow = 0.28 + state.foodPulse * 0.36;
        const foodColor = `rgba(247,185,85,${0.72 + state.foodPulse * 0.28})`;

        ctx.shadowColor = `rgba(247,185,85,${glow})`;
        ctx.shadowBlur = 18;
        drawCell(state.food.x, state.food.y, foodColor, 3, 7);
        ctx.shadowBlur = 0;
      }

      function draw(timestamp = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGrid();
        drawSnake();
        drawFood(timestamp);
      }

      function startGame() {
        if (state.running && !state.paused) return;
        if (state.over) resetGameData();

        state.running = true;
        state.paused = false;
        setStatus("进行中");
        hideOverlay();
        updateUi();
      }

      function pauseOrResume() {
        if (!state.running || state.over) return;

        state.paused = !state.paused;
        if (state.paused) {
          setStatus("已暂停");
          const pauseHint = mobileControlMode
            ? "点击继续按钮后，使用方向键盘控制蛇移动。"
            : "按空格或点击继续按钮恢复游戏。";
          showOverlay("游戏暂停", pauseHint, "继续游戏", () => pauseOrResume());
        } else {
          setStatus("进行中");
          hideOverlay();
        }
        updateUi();
      }

      function restartGame() {
        resetGameData();
        state.running = true;
        state.paused = false;
        setStatus("进行中");
        hideOverlay();
        updateUi();
      }

      function onKeyDown(event) {
        if (event.key === " ") {
          event.preventDefault();
          if (!state.running || state.over) {
            startGame();
          } else {
            pauseOrResume();
          }
          return;
        }

        if (event.key === "ArrowUp"    || event.key === "w" || event.key === "W") setDirection("up");
        if (event.key === "ArrowDown"  || event.key === "s" || event.key === "S") setDirection("down");
        if (event.key === "ArrowLeft"  || event.key === "a" || event.key === "A") setDirection("left");
        if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") setDirection("right");
      }

      function loop(timestamp) {
        if (state.running && !state.paused && !state.over) {
          if (!state.lastTime) state.lastTime = timestamp;
          const dt = (timestamp - state.lastTime) / 1000;
          state.lastTime = timestamp;

          state.accumulator += dt * speedByScore(state.score);
          const steps = Math.floor(state.accumulator);

          if (steps > 0) {
            state.accumulator -= steps;
            for (let i = 0; i < steps; i += 1) {
              if (!stepSnake()) break;
            }
          }
        } else {
          state.lastTime = timestamp;
        }

        draw(timestamp);
        state.rafId = requestAnimationFrame(loop);
      }

      function bindEvents() {
        startBtn.addEventListener("click", startGame);
        pauseBtn.addEventListener("click", pauseOrResume);
        restartBtn.addEventListener("click", restartGame);

        if (!mobileControlMode) {
          window.addEventListener("keydown", onKeyDown);
        }

        if (mobileControlMode) {
          dpadButtons.forEach((btn) => {
            const direction = btn.getAttribute("data-dir");
            btn.addEventListener("pointerdown", (event) => {
              event.preventDefault();
              if (!state.running || state.over) startGame();
              setDirection(direction);
            });
          });
        }
      }

      function init() {
        loadBest();
        resetGameData();
        bindEvents();
        const startHint = mobileControlMode
          ? "点击开始后使用方向键盘控制蛇移动。"
          : "点击开始或按空格键开始，方向键控制移动。";
        showOverlay("准备开始", startHint, "开始游戏", () => startGame());
        draw();
        state.rafId = requestAnimationFrame(loop);
      }

      init();
    })();
  </script>
</body>
</html>
